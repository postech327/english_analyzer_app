name: english_analyzer_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  fl_chart: ^0.64.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ─── 기존 것들 ───
  http: ^1.2.2
  pdf: ^3.11.3
  printing: ^5.14.3
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  file_saver: ^0.2.12
  universal_io: ^2.2.2
  archive: ^4.0.9
  xml: ^6.6.1

  # ─── 여기 추가 ───
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: NotoSansKR
      fonts:
        - asset: assets/fonts/Noto_Sans_KR/NotoSansKR-VariableFont_wght.ttf
